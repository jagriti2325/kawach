name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Temporarily remove the models folder ONLY in this runner
          # This does NOT delete it from your GitHub website repo
          rm -rf models
          
          # 2. Tell git to "forget" the models for this one push
          git config --global user.email "you@example.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Internal sync: excluding large models" || echo "No changes"
          
          # 3. Push the rest of the code (utils, app.py, pages)
          git remote add hf https://jagriti2325:$HF_TOKEN@huggingface.co/spaces/JagritiArora/Kawach-Diagnostic-Final
          git push --force hf main
