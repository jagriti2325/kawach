name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clean out the heavy files from the temporary runner
          rm -rf models
          rm -f "nimobest_model (1).pth"
          rm -f "nimobest_model.pth"
          
          # 2. Setup git identity for the temporary commit
          git config --global user.email "sync@example.com"
          git config --global user.name "Sync Bot"
          
          # 3. Create a clean branch without large file history
          git checkout --orphan latest_branch
          git add -A
          git commit -m "Clean sync: code only"
          git branch -D main
          git branch -m main
          
          # 4. Force push to Hugging Face
          git remote add hf https://jagriti2325:$HF_TOKEN@huggingface.co/spaces/JagritiArora/Kawach-Diagnostic-Final
          git push --force hf main
